name: Telegram Nachrichten

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 10 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install requests
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python nachrichten.py
